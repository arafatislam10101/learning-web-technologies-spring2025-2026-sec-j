<!DOCTYPE html>
<html>
<head>
<title>Date of Birth</title>
</head>

<body>

<h2>Date of Birth</h2>

<form onsubmit="return validDOB()">

<input type="text" id="dd" placeholder="dd" size="2"> /
<input type="text" id="mm" placeholder="mm" size="2"> /
<input type="text" id="yyyy" placeholder="yyyy" size="4">

<br><br>

<input type="submit" value="Submit">

</form>

<script>

function validDOB(){

let dd=document.getElementById("dd").value;
let mm=document.getElementById("mm").value;
let yyyy=document.getElementById("yyyy").value;

if(dd==="" || mm==="" || yyyy==="")
{
alert("date cannot be empty");
return false;
}

if(dd<1 || dd>31 || mm<1 || mm>12 || yyyy<1900 || yyyy>2016)
{
alert("enter valid date");
return false;
}

return true;

}

</script>

</body>
</html>
