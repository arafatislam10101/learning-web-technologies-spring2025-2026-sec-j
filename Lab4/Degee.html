<!DOCTYPE html>
<html>
<head>
<title>Degree</title>
</head>

<body>

<h2>Degree</h2>

<form onsubmit="return validDegree()">

<input type="checkbox" name="degree">SSC
<input type="checkbox" name="degree">HSC
<input type="checkbox" name="degree">BSc

<br><br>

<input type="submit" value="Submit">

</form>

<script>

function validDegree(){

let degree=document.getElementsByName("degree");

for(let i=0;i<degree.length;i++)
{
if(degree[i].checked)
{
return true;
}
}

alert("select at least one degree");
return false;

}

</script>

</body>
</html>
