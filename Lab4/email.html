<!DOCTYPE html>
<html>
<head>
<title>Email</title>
</head>

<body>

<h2>Email</h2>

<form onsubmit="return validEmail()">
<input type="text" id="email">
<br><br>
<input type="submit" value="Submit">
</form>

<script>

function validEmail(){

let email=document.getElementById("email").value.trim();
let regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(email==="")
{
alert("email cannot be empty");
return false;
}

if(!regex.test(email))
{
alert("enter a valid email");
return false;
}

return true;

}

</script>

</body>
</html>
