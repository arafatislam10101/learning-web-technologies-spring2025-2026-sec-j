<!DOCTYPE html>
<html>
<head>
    <title>Profile Picture</title>
</head>

<body>
    <h2>Profile Picture</h2>

    <form onsubmit="return validProfile()">
        User Id:<br>
        <input type="text" id="userid"><br><br>

        Picture:<br>
        <input type="file" id="picture"><br><br>

        <input type="submit" value="Submit">
    </form>

    <script>
        function validProfile() {
            let uid = document.getElementById("userid").value.trim();
            let pic = document.getElementById("picture").value;

            // User ID validation
            if (uid === "") {
                alert("UserId cannot be empty");
                return false;
            }

            if (isNaN(uid) || Number(uid) <= 0) {
                alert("UserId must be a positive number");
                return false;
            }

            // Picture validation
            if (pic === "") {
                alert("Picture cannot be empty");
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
